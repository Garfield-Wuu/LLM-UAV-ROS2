mapping:
  frames:
    world_frame: "world"
    planner_frame: "world"
    vins_frame: "world"
    px4_local_frame: "NED"
    project_convention_note: "规划层统一使用world(ENU)，对接PX4执行层时在桥接层处理ENU/NED转换。"

  input_topics:
    target_goal:
      from: "/uav/target_goal"
      type: "geometry_msgs/msg/PoseStamped"
      to: "/goal_pose"
      owner: "ego_planner"
      note: "TextCommandBridge在GOTO_NED时发布目标点，供规划器消费。"
    odometry:
      from: "/vins/odometry"
      type: "nav_msgs/msg/Odometry"
      to:
        - "odom_world"
        - "grid_map/odom"
      owner: "ego_planner"
      note: "VINS位姿作为规划状态输入。"
    cloud:
      from: "/uav/camera/points"
      type: "sensor_msgs/msg/PointCloud2"
      to: "grid_map/cloud"
      owner: "ego_planner"
      note: "AirSim深度点云输入占据栅格。"

  planner_output:
    bspline:
      from: "/uav/ego_planner/bspline"
      type: "traj_utils/msg/Bspline"
      to: "/uav/planner_cmd_vel_stamped"
      relay_node: "ego_bspline_to_twist_relay"
      note: "通过B样条速度近似转换为TwistStamped。"
    velocity_bridge:
      from: "/uav/planner_cmd_vel_stamped"
      type: "geometry_msgs/msg/TwistStamped"
      to: "/hw_insight/keyboard_velocity"
      relay_node: "planner_velocity_bridge"
      note: "复用现有move_velocity执行链。"

  semantic_perception:
    target_query:
      topic: "/uav/target_query"
      type: "std_msgs/msg/String"
      note: "文本prompt，如'red car'，由LLM或手动发布"
    detections_2d:
      topic: "/uav/detections_2d"
      type: "std_msgs/msg/String"
      note: "YOLO-World 2D检测结果JSON（label/score/bbox/stamp）"
      owner: "yolo_world_detector"
    semantic_targets_camera:
      topic: "/uav/semantic_targets_camera"
      type: "std_msgs/msg/String"
      note: "camera frame 3D目标点JSON（x_cam/y_cam/z_cam + depth）"
      owner: "target_grounding_node"
    semantic_targets_world:
      topic: "/uav/semantic_targets_world"
      type: "std_msgs/msg/String"
      note: "world frame 3D目标点JSON（x_world/y_world/z_world）"
      owner: "semantic_target_tf_node"
    semantic_target_marker:
      topic: "/uav/semantic_target_marker"
      type: "visualization_msgs/msg/Marker"
      note: "RViz球体可视化，world frame"
      owner: "semantic_target_tf_node"

  safety:
    timeout_sec: 0.35
    max_vx: 15.0
    max_vy: 15.0
    max_vz: 5.0
    max_yaw_rate: 1.5
